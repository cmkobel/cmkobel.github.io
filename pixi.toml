[workspace]
authors = ["Carl M. Kobel <cmkobel@mbg.au.dk>"]
channels = ["conda-forge"]
name = "cmkobel.github.io"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
install = "gem install bundler && bundle install"
serve = "bundle exec jekyll serve -l -H localhost"
build = "bundle exec jekyll build"

# conda's bundled linker (ld64) can't parse the newest macOS SDK's libSystem
# stubs, so native gem builds fail with "_printf undefined". Pin the build to
# an older, compatible Command Line Tools SDK so extensions compile+link.
[activation.env]
SDKROOT = "/Library/Developer/CommandLineTools/SDKs/MacOSX15.sdk"
CONDA_BUILD_SYSROOT = "/Library/Developer/CommandLineTools/SDKs/MacOSX15.sdk"

[dependencies]
ruby = ">=3.1"
c-compiler = ">=1.0"
cxx-compiler = ">=1.0"
make = ">=4.0"
pkg-config = ">=0.29"
openssl = ">=3.0"
